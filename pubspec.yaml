name: greenbin
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  dio: ^5.9.0
  flutter_secure_storage: ^9.2.4
  equatable: ^2.0.7
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  curved_navigation_bar: ^1.0.6
  extended_image: ^8.0.3
  font_awesome_flutter: 10.7.0
  timeago: ^3.7.1
  google_maps_flutter: ^2.5.3
  go_router: ^13.1.0
  flutter_native_splash: ^2.3.7
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.1.6
  flutter_launcher_icons: ^0.13.1
  flutter_bloc: ^9.1.1
  rxdart: ^0.28.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  nominatim_flutter: ^0.0.8
  connectivity_plus: ^5.0.2
  geolocator: ^11.1.0
  socket_io_client: ^3.0.2
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  infinite_scroll_pagination: ^4.1.0
  bloc_concurrency: ^0.3.0
  cached_network_image: ^3.4.1
  flutter_slidable: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^2.0.0


flutter:


  uses-material-design: true

  assets:
    - assets/icons/logo_bg_remove.png
    - assets/icons/logo_no_background.jpg


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo_no_background.jpg" # Đường dẫn đến file ảnh của bạn
  adaptive_icon_background: "#ffffff" # Màu nền cho Android (nếu cần)
  adaptive_icon_foreground: "assets/icons/logo_no_background.jpg"
  remove_alpha_ios: true